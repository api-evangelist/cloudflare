- aid: cloudflare:cloudflare-workers-ai-api
  name: Cloudflare Workers AI API
  tags:
  - Artificial Intelligence
  - Machine Learning
  - Inference
  humanURL: https://developers.cloudflare.com/workers-ai/
  baseURL: https://api.cloudflare.com
