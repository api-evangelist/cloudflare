    type: Documentation
  - url: https://developers.cloudflare.com/ddos-protection/get-started/
    type: Getting Started
  description: >-
    The Cloudflare DDoS Protection API provides managed rulesets for mitigating DDoS attacks at both the application and network layers. Developers can configure HTTP and network-layer attack protection overrides, adjust sensitivity levels, and customize actions via the Rulesets API.
- aid: cloudflare:cloudflare-zaraz-api
  name: Cloudflare Zaraz API
  tags:
  - Third-Party Tools
  - Analytics
  - Performance
  humanURL: https://developers.cloudflare.com/zaraz/
  baseURL: https://api.cloudflare.com
  properties:
