  description: >-
    The Cloudflare 1.1.1.1 DNS Resolver is a fast and privacy-focused public DNS resolver. It supports DNS over HTTPS (DoH) and DNS over TLS (DoT) for encrypted DNS queries, with WARP integration for device-level traffic protection and family-friendly filtering options.
