  - url: https://developers.cloudflare.com/api/resources/queues/
    type: Reference
  - url: https://developers.cloudflare.com/queues/get-started/
    type: Getting Started
  description: >-
    The Cloudflare Queues API enables developers to create and manage message queues that integrate with Cloudflare Workers. Queues support guaranteed delivery, work offloading from requests, worker-to-worker communication, and data buffering and batching.
- aid: cloudflare:cloudflare-durable-objects-api
  name: Cloudflare Durable Objects API
  tags:
  - Stateful
  - Serverless
  - Storage
  humanURL: https://developers.cloudflare.com/durable-objects/
  baseURL: https://api.cloudflare.com
  properties:
  - url: openapi/cloudflare-durable-objects-openapi.yml
