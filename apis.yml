  description: >-
    The Cloudflare Browser Rendering API enables developers to control headless browser instances on Cloudflare's global network. The REST API provides endpoints for capturing screenshots, extracting HTML content, generating PDFs, scraping elements, and converting pages to markdown, with support for Puppeteer and Playwright automation.
- aid: cloudflare:cloudflare-realtime-api
  name: Cloudflare Realtime API
  tags:
  - WebRTC
  - Real-Time Communication
  - Video
  - Audio
  humanURL: https://developers.cloudflare.com/realtime/
  baseURL: https://api.cloudflare.com
  properties:
