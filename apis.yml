    type: Documentation
  - url: https://developers.cloudflare.com/zaraz/get-started/
    type: Getting Started
  description: >-
    The Cloudflare Zaraz API allows developers to load and manage third-party tools in the cloud instead of the browser. It provides a unified web API with track, set, and ecommerce methods for sending events to third-party tools, improving page load performance and privacy.
- aid: cloudflare:cloudflare-secrets-store-api
  name: Cloudflare Secrets Store API
  tags:
  - Secrets Management
  - Security
  - Configuration
  humanURL: https://developers.cloudflare.com/secrets-store/
  baseURL: https://api.cloudflare.com
