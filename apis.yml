  - url: https://developers.cloudflare.com/stream/
    type: Documentation
  - url: https://developers.cloudflare.com/stream/get-started/
    type: Getting Started
  description: >-
    Cloudflare Stream provides a single API for uploading, storing, encoding, and delivering live and on-demand video. The API supports direct uploads, TUS resumable uploads, live streaming via RTMPS and SRT, video playback with a built-in player, and signed URL access control.
- aid: cloudflare:cloudflare-images-api
  name: Cloudflare Images API
  tags:
  - Images
  - Media
  - Transformation
  humanURL: https://developers.cloudflare.com/images/
  baseURL: https://api.cloudflare.com
  properties:
  - url: openapi/cloudflare-images-openapi.yml
    type: OpenAPI
  - url: https://developers.cloudflare.com/images/
    type: Documentation
  - url: https://developers.cloudflare.com/images/get-started/
    type: Getting Started
  description: >-
    The Cloudflare Images API allows developers to upload, store, and transform images at scale. It supports direct uploads, URL-based uploads, on-the-fly image transformations via URL parameters, and integration with Workers for programmatic image processing.
- aid: cloudflare:cloudflare-turnstile-api
  name: Cloudflare Turnstile API
  tags:
  - CAPTCHA
  - Bot Protection
  - Security
  humanURL: https://developers.cloudflare.com/turnstile/
  baseURL: https://api.cloudflare.com
  properties:
  - url: openapi/cloudflare-turnstile-openapi.yml
    type: OpenAPI
  - url: https://developers.cloudflare.com/turnstile/
    type: Documentation
  - url: https://developers.cloudflare.com/turnstile/get-started/
    type: Getting Started
  description: >-
    Cloudflare Turnstile is a CAPTCHA replacement that verifies visitors without showing a challenge. The API provides a widget for client-side integration and a server-side siteverify endpoint for token validation, with support for managed, non-interactive, and invisible modes.
- aid: cloudflare:cloudflare-load-balancing-api
  name: Cloudflare Load Balancing API
  tags:
  - Load Balancing
  - Traffic Management
  - Performance
  humanURL: https://developers.cloudflare.com/load-balancing/
  baseURL: https://api.cloudflare.com
  properties:
  - url: https://developers.cloudflare.com/load-balancing/
    type: Documentation
  - url: https://developers.cloudflare.com/api/resources/load_balancers/
    type: Reference
  - url: https://developers.cloudflare.com/load-balancing/get-started/
    type: Getting Started
  description: >-
    The Cloudflare Load Balancing API enables developers to distribute traffic across endpoints to reduce strain and latency. It provides endpoints for managing load balancers, pools, monitors, and health checks with support for geographic steering and session affinity.
- aid: cloudflare:cloudflare-waf-api
  name: Cloudflare WAF API
  tags:
  - Web Application Firewall
  - Security
  - Rules
  humanURL: https://developers.cloudflare.com/waf/
  baseURL: https://api.cloudflare.com
  properties:
  - url: https://developers.cloudflare.com/waf/
    type: Documentation
  - url: https://developers.cloudflare.com/waf/get-started/
    type: Getting Started
  description: >-
    The Cloudflare Web Application Firewall API checks incoming web and API requests and filters undesired traffic using rulesets. It supports managed rules, custom rules, rate limiting rules, and provides endpoints for deploying and managing rulesets via the Rulesets API.
- aid: cloudflare:cloudflare-logpush-api
  name: Cloudflare Logpush API
  tags:
  - Logs
  - Observability
  - Analytics
  humanURL: https://developers.cloudflare.com/logs/
  baseURL: https://api.cloudflare.com
  properties:
  - url: openapi/cloudflare-logpush-openapi.yml
    type: OpenAPI
  - url: https://developers.cloudflare.com/logs/
    type: Documentation
  - url: https://developers.cloudflare.com/api/resources/logpush/
    type: Reference
  description: >-
    The Cloudflare Logpush API allows developers to configure jobs that push logs to storage services, SIEMs, and log management providers. It supports datasets including HTTP requests, firewall events, DNS logs, and spectrum events with configurable output options.
- aid: cloudflare:cloudflare-graphql-analytics-api
  name: Cloudflare GraphQL Analytics API
  tags:
  - Analytics
  - GraphQL
  - Reporting
  humanURL: https://developers.cloudflare.com/analytics/graphql-api/
  baseURL: https://api.cloudflare.com
  properties:
  - url: https://developers.cloudflare.com/analytics/graphql-api/
    type: Documentation
  - url: https://developers.cloudflare.com/analytics/graphql-api/getting-started/
    type: Getting Started
  description: >-
    The Cloudflare GraphQL Analytics API provides flexible access to analytics data across Cloudflare products including HTTP requests, firewall events, and load balancing metrics. Developers can query specific datasets, filter by dimensions, and aggregate data for custom reporting.
- aid: cloudflare:cloudflare-magic-transit-api
  name: Cloudflare Magic Transit API
  tags:
  - Network Security
  - DDoS Protection
  - Networking
  humanURL: https://developers.cloudflare.com/magic-transit/
  baseURL: https://api.cloudflare.com
  properties:
  - url: https://developers.cloudflare.com/magic-transit/
    type: Documentation
  - url: https://developers.cloudflare.com/api/resources/magic_transit/
    type: Reference
  - url: https://developers.cloudflare.com/magic-transit/get-started/
    type: Getting Started
  description: >-
    The Cloudflare Magic Transit API provides endpoints for managing network security and performance for on-premises, cloud-hosted, and hybrid networks. It supports managing sites, site ACLs, static routes, GRE tunnels, and network interconnects for DDoS protection and traffic acceleration.
- aid: cloudflare:cloudflare-email-routing-api
  name: Cloudflare Email Routing API
  tags:
  - Email
  - Routing
  - Messaging
  humanURL: https://developers.cloudflare.com/email-routing/
  baseURL: https://api.cloudflare.com
  properties:
  - url: https://developers.cloudflare.com/email-routing/
    type: Documentation
  description: >-
    The Cloudflare Email Routing API enables developers to create and manage custom email addresses and routing rules for their domains. It supports forwarding emails to destination addresses, creating catch-all rules, and integrating with Workers for programmatic email processing.
- aid: cloudflare:cloudflare-waiting-room-api
  name: Cloudflare Waiting Room API
  tags:
  - Traffic Management
  - Queue
  - Performance
  humanURL: https://developers.cloudflare.com/waiting-room/
  baseURL: https://api.cloudflare.com
  properties:
  - url: https://developers.cloudflare.com/waiting-room/
    type: Documentation
  description: >-
    The Cloudflare Waiting Room API allows developers to manage virtual waiting rooms that route excess visitors to a customizable queue during high traffic. It provides endpoints for creating waiting rooms, configuring thresholds, and managing rules for session handling.
- aid: cloudflare:cloudflare-spectrum-api
  name: Cloudflare Spectrum API
  tags:
  - TCP
  - UDP
  - DDoS Protection
  humanURL: https://developers.cloudflare.com/spectrum/
  baseURL: https://api.cloudflare.com
  properties:
  - url: https://developers.cloudflare.com/spectrum/
    type: Documentation
  description: >-
    Cloudflare Spectrum extends Cloudflare's DDoS protection and performance benefits to any TCP or UDP application. The API enables developers to manage Spectrum applications, configure origin connections, and apply IP firewall rules to non-HTTP traffic.
- aid: cloudflare:cloudflare-hyperdrive-api
  name: Cloudflare Hyperdrive API
  tags:
  - Database
  - Connection Pooling
  - Performance
  humanURL: https://developers.cloudflare.com/hyperdrive/
  baseURL: https://api.cloudflare.com
  properties:
  - url: openapi/cloudflare-hyperdrive-openapi.yml
    type: OpenAPI
  - url: https://developers.cloudflare.com/hyperdrive/
    type: Documentation
  - url: https://developers.cloudflare.com/api/resources/hyperdrive/
    type: Reference
  description: >-
    Cloudflare Hyperdrive accelerates access to existing databases from Cloudflare Workers by providing connection pooling and query caching at the edge. The API allows developers to create and manage Hyperdrive configurations that connect to PostgreSQL and other databases.
- aid: cloudflare:cloudflare-api-shield-api
  name: Cloudflare API Shield API
  tags:
  - API Security
  - Schema Validation
  - API Gateway
  humanURL: https://developers.cloudflare.com/api-shield/
  baseURL: https://api.cloudflare.com
  properties:
  - url: https://developers.cloudflare.com/api-shield/
    type: Documentation
  description: >-
    Cloudflare API Shield provides API discovery, schema validation, and security features to protect APIs from abuse. It includes API Gateway capabilities for routing, authentication, and rate limiting, along with sequence-based fraud detection and mTLS client certificate enforcement.
- aid: cloudflare:cloudflare-zero-trust-api
  name: Cloudflare Zero Trust API
  tags:
  - Zero Trust
  - Security
  - Access Control
  humanURL: https://developers.cloudflare.com/cloudflare-one/
  baseURL: https://api.cloudflare.com
  properties:
  - url: https://developers.cloudflare.com/cloudflare-one/
    type: Documentation
  description: >-
    The Cloudflare Zero Trust API enables developers to manage secure access to applications and networks without a traditional VPN. It includes Access policies, Gateway DNS and HTTP filtering, Tunnel management, device posture checks, and Data Loss Prevention configuration.
- aid: cloudflare:cloudflare-registrar-api
  name: Cloudflare Registrar API
  tags:
  - Domains
  - Registration
  - DNS
  humanURL: https://developers.cloudflare.com/registrar/
