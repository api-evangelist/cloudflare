    type: Documentation
  - url: https://developers.cloudflare.com/web-analytics/get-started/
    type: Getting Started
  description: >-
    The Cloudflare Web Analytics API provides privacy-first real user measurement (RUM) analytics for websites. It uses a lightweight JavaScript beacon to collect performance data via the Performance API without cookies or IP tracking, with support for automatic and manual injection.
- aid: cloudflare:cloudflare-cache-api
  name: Cloudflare Cache API
  tags:
  - CDN
  - Caching
  - Performance
  humanURL: https://developers.cloudflare.com/cache/
