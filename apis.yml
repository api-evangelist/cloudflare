    type: Reference
  - url: https://developers.cloudflare.com/realtime/turn/
    type: Reference
  description: >-
    The Cloudflare Realtime API provides WebRTC infrastructure for building real-time audio and video applications. It includes a Selective Forwarding Unit (SFU) for media routing across Cloudflare's global network, a managed TURN relay service for NAT traversal, and the RealtimeKit SDK for simplified integration.
- aid: cloudflare:cloudflare-containers-api
  name: Cloudflare Containers API
  tags:
  - Containers
  - Serverless
  - Compute
  humanURL: https://developers.cloudflare.com/containers/
  baseURL: https://api.cloudflare.com
  properties:
  - url: https://developers.cloudflare.com/containers/
    type: Documentation
  - url: https://developers.cloudflare.com/containers/get-started/
    type: Getting Started
  description: >-
    The Cloudflare Containers API allows developers to run container workloads on Cloudflare's global network, managed directly from Workers code. Containers support full isolation, on-demand scaling, GPU access, and a hybrid model that combines serverless speed with container flexibility for stateful and stateless workloads.
- aid: cloudflare:cloudflare-ai-search-api
  name: Cloudflare AI Search API
  tags:
  - Artificial Intelligence
  - RAG
  - Search
  humanURL: https://developers.cloudflare.com/ai-search/
  baseURL: https://api.cloudflare.com
