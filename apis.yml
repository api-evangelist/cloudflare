    type: Reference
  - url: https://developers.cloudflare.com/kv/get-started/
    type: Getting Started
  description: >-
    Cloudflare Workers KV is a global, low-latency key-value data store. The KV API allows developers to create namespaces, write and read key-value pairs, list keys, and perform bulk operations with support for up to 10,000 key-value pairs per request.
- aid: cloudflare:cloudflare-queues-api
  name: Cloudflare Queues API
  tags:
  - Queues
  - Messaging
  - Serverless
  humanURL: https://developers.cloudflare.com/queues/
  baseURL: https://api.cloudflare.com
  properties:
  - url: openapi/cloudflare-queues-openapi.yml
