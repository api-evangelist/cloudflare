    type: Reference
  - url: https://developers.cloudflare.com/ai-search/get-started/
    type: Getting Started
  description: >-
    The Cloudflare AI Search API provides fully managed retrieval-augmented generation (RAG) pipelines. Developers upload documents to R2 and AI Search handles embeddings, indexing, retrieval, and response generation via a REST API, enabling context-aware AI search without managing infrastructure.
- aid: cloudflare:cloudflare-agents-api
  name: Cloudflare Agents API
  tags:
  - Artificial Intelligence
  - Agents
  - Serverless
