naftiko: 1.0.0-alpha2
info:
  label: Cloudflare DNS API — DNS Record Import/Export
  description: 'Cloudflare DNS API — DNS Record Import/Export. 2 operations. Lead operation: Cloudflare Export Dns Records.
    Self-contained Naftiko capability covering one Cloudflare business surface.'
  tags:
  - Cloudflare
  - DNS Record Import/Export
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CLOUDFLARE_API_KEY: CLOUDFLARE_API_KEY
capability:
  consumes:
  - type: http
    namespace: dns-dns-record-import-export
    baseUri: https://api.cloudflare.com/client/v4
    description: Cloudflare DNS API — DNS Record Import/Export business capability. Self-contained, no shared references.
    resources:
    - name: zones-zone_id-dns_records-export
      path: /zones/{zone_id}/dns_records/export
      operations:
      - name: exportdnsrecords
        method: GET
        description: Cloudflare Export Dns Records
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: zones-zone_id-dns_records-import
      path: /zones/{zone_id}/dns_records/import
      operations:
      - name: importdnsrecords
        method: POST
        description: Cloudflare Import Dns Records
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.CLOUDFLARE_API_KEY}}'
  exposes:
  - type: rest
    namespace: dns-dns-record-import-export-rest
    port: 8080
    description: REST adapter for Cloudflare DNS API — DNS Record Import/Export. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/zones/{zone-id}/dns-records/export
      name: zones-zone-id-dns-records-export
      description: REST surface for zones-zone_id-dns_records-export.
      operations:
      - method: GET
        name: exportdnsrecords
        description: Cloudflare Export Dns Records
        call: dns-dns-record-import-export.exportdnsrecords
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/zones/{zone-id}/dns-records/import
      name: zones-zone-id-dns-records-import
      description: REST surface for zones-zone_id-dns_records-import.
      operations:
      - method: POST
        name: importdnsrecords
        description: Cloudflare Import Dns Records
        call: dns-dns-record-import-export.importdnsrecords
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: dns-dns-record-import-export-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cloudflare DNS API — DNS Record Import/Export. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: cloudflare-export-dns-records
      description: Cloudflare Export Dns Records
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: dns-dns-record-import-export.exportdnsrecords
      outputParameters:
      - type: object
        mapping: $.
    - name: cloudflare-import-dns-records
      description: Cloudflare Import Dns Records
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: dns-dns-record-import-export.importdnsrecords
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
