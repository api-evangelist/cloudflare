naftiko: 1.0.0-alpha2
info:
  label: Cloudflare Workers API — Scripts
  description: 'Cloudflare Workers API — Scripts. 4 operations. Lead operation: Cloudflare List Worker Scripts. Self-contained
    Naftiko capability covering one Cloudflare business surface.'
  tags:
  - Cloudflare
  - Scripts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CLOUDFLARE_API_KEY: CLOUDFLARE_API_KEY
capability:
