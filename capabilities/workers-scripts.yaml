    port: 9090
    transport: http
    description: MCP adapter for Cloudflare Workers API — Scripts. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: cloudflare-list-worker-scripts
      description: Cloudflare List Worker Scripts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: workers-scripts.listscripts
      outputParameters:
      - type: object
        mapping: $.
    - name: cloudflare-download-worker-script
      description: Cloudflare Download Worker Script
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: workers-scripts.downloadscript
      outputParameters:
      - type: object
        mapping: $.
    - name: cloudflare-upload-worker-script
      description: Cloudflare Upload Worker Script
      hints:
