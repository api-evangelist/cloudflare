    namespace: workers-scripts
    baseUri: https://api.cloudflare.com/client/v4
    description: Cloudflare Workers API — Scripts business capability. Self-contained, no shared references.
    resources:
    - name: accounts-account_id-workers-scripts
      path: /accounts/{account_id}/workers/scripts
      operations:
      - name: listscripts
        method: GET
        description: Cloudflare List Worker Scripts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: accounts-account_id-workers-scripts-script_name
      path: /accounts/{account_id}/workers/scripts/{script_name}
      operations:
      - name: downloadscript
        method: GET
        description: Cloudflare Download Worker Script
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: uploadscript
        method: PUT
        description: Cloudflare Upload Worker Script
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletescript
        method: DELETE
        description: Cloudflare Delete Worker Script
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.CLOUDFLARE_API_KEY}}'
  exposes:
  - type: rest
    namespace: workers-scripts-rest
    port: 8080
    description: REST adapter for Cloudflare Workers API — Scripts. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/accounts/{account-id}/workers/scripts
      name: accounts-account-id-workers-scripts
      description: REST surface for accounts-account_id-workers-scripts.
      operations:
      - method: GET
        name: listscripts
        description: Cloudflare List Worker Scripts
        call: workers-scripts.listscripts
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/accounts/{account-id}/workers/scripts/{script-name}
      name: accounts-account-id-workers-scripts-script-name
      description: REST surface for accounts-account_id-workers-scripts-script_name.
      operations:
      - method: GET
        name: downloadscript
        description: Cloudflare Download Worker Script
        call: workers-scripts.downloadscript
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: uploadscript
        description: Cloudflare Upload Worker Script
        call: workers-scripts.uploadscript
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletescript
        description: Cloudflare Delete Worker Script
        call: workers-scripts.deletescript
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
