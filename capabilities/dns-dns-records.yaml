      - name: deletednsrecord
        method: DELETE
        description: Cloudflare Delete Dns Record
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.CLOUDFLARE_API_KEY}}'
