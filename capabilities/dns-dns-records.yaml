        method: GET
        description: Cloudflare List Dns Records
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: type
          in: query
          type: string
          description: DNS record type to filter by.
        - name: name
          in: query
          type: string
          description: DNS record name to filter by.
        - name: content
          in: query
          type: string
          description: DNS record content to filter by.
        - name: page
          in: query
          type: integer
          description: Page number of paginated results.
        - name: per_page
          in: query
          type: integer
          description: Number of records per page.
      - name: creatednsrecord
        method: POST
        description: Cloudflare Create Dns Record
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
