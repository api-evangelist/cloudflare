naftiko: 1.0.0-alpha2
info:
  label: Cloudflare D1 API — Time Travel
  description: 'Cloudflare D1 API — Time Travel. 2 operations. Lead operation: Cloudflare Get D1 Database Bookmark. Self-contained
    Naftiko capability covering one Cloudflare business surface.'
  tags:
  - Cloudflare
  - Time Travel
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CLOUDFLARE_API_KEY: CLOUDFLARE_API_KEY
capability:
  consumes:
  - type: http
    namespace: d1-time-travel
    baseUri: https://api.cloudflare.com/client/v4
    description: Cloudflare D1 API — Time Travel business capability. Self-contained, no shared references.
    resources:
    - name: accounts-account_id-d1-database-database_id-time_travel-bookmark
      path: /accounts/{account_id}/d1/database/{database_id}/time_travel/bookmark
      operations:
      - name: getd1bookmark
        method: GET
        description: Cloudflare Get D1 Database Bookmark
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: accounts-account_id-d1-database-database_id-time_travel-restore
      path: /accounts/{account_id}/d1/database/{database_id}/time_travel/restore
      operations:
      - name: restored1database
        method: POST
        description: Cloudflare Restore D1 Database
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.CLOUDFLARE_API_KEY}}'
  exposes:
  - type: rest
    namespace: d1-time-travel-rest
    port: 8080
    description: REST adapter for Cloudflare D1 API — Time Travel. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/accounts/{account-id}/d1/database/{database-id}/time-travel/bookmark
      name: accounts-account-id-d1-database-database-id-time-travel-bookmark
      description: REST surface for accounts-account_id-d1-database-database_id-time_travel-bookmark.
      operations:
      - method: GET
        name: getd1bookmark
        description: Cloudflare Get D1 Database Bookmark
        call: d1-time-travel.getd1bookmark
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/accounts/{account-id}/d1/database/{database-id}/time-travel/restore
      name: accounts-account-id-d1-database-database-id-time-travel-restore
      description: REST surface for accounts-account_id-d1-database-database_id-time_travel-restore.
      operations:
      - method: POST
        name: restored1database
        description: Cloudflare Restore D1 Database
        call: d1-time-travel.restored1database
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: d1-time-travel-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cloudflare D1 API — Time Travel. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: cloudflare-get-d1-database-bookmark
      description: Cloudflare Get D1 Database Bookmark
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: d1-time-travel.getd1bookmark
      outputParameters:
      - type: object
        mapping: $.
    - name: cloudflare-restore-d1-database
      description: Cloudflare Restore D1 Database
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: d1-time-travel.restored1database
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
