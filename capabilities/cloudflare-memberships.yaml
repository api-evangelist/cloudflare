naftiko: 1.0.0-alpha2
info:
  label: Cloudflare API — Memberships
  description: 'Cloudflare API — Memberships. 4 operations. Lead operation: Cloudflare List Memberships. Self-contained Naftiko
    capability covering one Cloudflare business surface.'
  tags:
  - Cloudflare
  - Memberships
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CLOUDFLARE_API_KEY: CLOUDFLARE_API_KEY
capability:
  consumes:
  - type: http
    namespace: cloudflare-memberships
    baseUri: https://api.cloudflare.com/client/v4
    description: Cloudflare API — Memberships business capability. Self-contained, no shared references.
    resources:
    - name: memberships
      path: /memberships
      operations:
      - name: usersaccountmembershipslistmemberships
        method: GET
        description: Cloudflare List Memberships
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: account.name
          in: query
          type: string
        - name: page
          in: query
          type: number
        - name: per_page
          in: query
          type: number
        - name: order
          in: query
          type: string
        - name: direction
          in: query
          type: string
        - name: name
          in: query
          type: string
        - name: status
          in: query
          type: string
    - name: memberships-membership_id
      path: /memberships/{membership_id}
      operations:
      - name: usersaccountmembershipsdeletemembership
        method: DELETE
        description: Cloudflare Delete Membership
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: membership_id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: usersaccountmembershipsmembershipdetails
        method: GET
        description: Cloudflare Membership Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: membership_id
          in: path
          type: string
          required: true
      - name: usersaccountmembershipsupdatemembership
        method: PUT
        description: Cloudflare Update Membership
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: membership_id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.CLOUDFLARE_API_KEY}}'
  exposes:
  - type: rest
    namespace: cloudflare-memberships-rest
    port: 8080
    description: REST adapter for Cloudflare API — Memberships. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/memberships
      name: memberships
      description: REST surface for memberships.
      operations:
      - method: GET
        name: usersaccountmembershipslistmemberships
        description: Cloudflare List Memberships
        call: cloudflare-memberships.usersaccountmembershipslistmemberships
        with:
          account.name: rest.account.name
          page: rest.page
          per_page: rest.per_page
          order: rest.order
          direction: rest.direction
          name: rest.name
          status: rest.status
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/memberships/{membership-id}
      name: memberships-membership-id
      description: REST surface for memberships-membership_id.
      operations:
      - method: DELETE
        name: usersaccountmembershipsdeletemembership
        description: Cloudflare Delete Membership
        call: cloudflare-memberships.usersaccountmembershipsdeletemembership
        with:
          membership_id: rest.membership_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: usersaccountmembershipsmembershipdetails
        description: Cloudflare Membership Details
        call: cloudflare-memberships.usersaccountmembershipsmembershipdetails
        with:
          membership_id: rest.membership_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: usersaccountmembershipsupdatemembership
        description: Cloudflare Update Membership
        call: cloudflare-memberships.usersaccountmembershipsupdatemembership
        with:
          membership_id: rest.membership_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cloudflare-memberships-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cloudflare API — Memberships. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: cloudflare-list-memberships
      description: Cloudflare List Memberships
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloudflare-memberships.usersaccountmembershipslistmemberships
      with:
        account.name: tools.account.name
        page: tools.page
        per_page: tools.per_page
        order: tools.order
        direction: tools.direction
        name: tools.name
        status: tools.status
      outputParameters:
      - type: object
        mapping: $.
    - name: cloudflare-delete-membership
      description: Cloudflare Delete Membership
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: cloudflare-memberships.usersaccountmembershipsdeletemembership
      with:
        membership_id: tools.membership_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: cloudflare-membership-details
      description: Cloudflare Membership Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloudflare-memberships.usersaccountmembershipsmembershipdetails
      with:
        membership_id: tools.membership_id
      outputParameters:
      - type: object
        mapping: $.
    - name: cloudflare-update-membership
      description: Cloudflare Update Membership
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: cloudflare-memberships.usersaccountmembershipsupdatemembership
      with:
        membership_id: tools.membership_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
