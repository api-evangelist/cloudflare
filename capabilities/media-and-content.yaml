naftiko: "1.0.0-alpha1"

info:
  label: "Cloudflare Media and Content"
  description: "Media management combining Stream video platform and Images service for uploading, processing, and delivering video and image content at scale. Used by content creators and media engineers."
  tags:
    - Cloudflare
    - Media
    - Video
    - Images
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      CLOUDFLARE_API_TOKEN: CLOUDFLARE_API_TOKEN

capability:
  consumes:
    - import: cloudflare-stream
      location: ./shared/stream.yaml
    - import: cloudflare-images
      location: ./shared/images.yaml

  exposes:
    - type: rest
      port: 8083
      namespace: media-content-api
      description: "Unified REST API for Cloudflare media and content services."
      resources:
        - path: /v1/videos
          name: videos
          description: "Video management."
          operations:
            - method: GET
              name: list-videos
              description: "List videos."
              call: "cloudflare-stream.list-videos"
              with:
                account_id: "rest.account_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/images
          name: images
          description: "Image management."
          operations:
            - method: GET
              name: list-images
              description: "List images."
              call: "cloudflare-images.list-images"
              with:
                account_id: "rest.account_id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9083
      namespace: media-content-mcp
      transport: http
      description: "MCP server for AI-assisted Cloudflare media management."
      tools:
        - name: stream-list-videos
          description: "List all videos."
          hints:
            readOnly: true
            openWorld: true
          call: "cloudflare-stream.list-videos"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: stream-upload-video
          description: "Upload a video from URL."
          hints:
            readOnly: false
          call: "cloudflare-stream.upload-video"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: stream-get-video
          description: "Get video details."
          hints:
            readOnly: true
          call: "cloudflare-stream.get-video"
          with:
            account_id: "tools.account_id"
            video_id: "tools.video_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: stream-delete-video
          description: "Delete a video."
          hints:
            destructive: true
            idempotent: true
          call: "cloudflare-stream.delete-video"
          with:
            account_id: "tools.account_id"
            video_id: "tools.video_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: stream-list-live-inputs
          description: "List live streaming inputs."
          hints:
            readOnly: true
          call: "cloudflare-stream.list-live-inputs"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: stream-create-live-input
          description: "Create a live streaming input."
          hints:
            readOnly: false
          call: "cloudflare-stream.create-live-input"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: stream-create-direct-upload
          description: "Create a direct upload URL."
          hints:
            readOnly: false
          call: "cloudflare-stream.create-direct-upload"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: images-list-images
          description: "List all images."
          hints:
            readOnly: true
            openWorld: true
          call: "cloudflare-images.list-images"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: images-upload-image
          description: "Upload an image."
          hints:
            readOnly: false
          call: "cloudflare-images.upload-image"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: images-get-image
          description: "Get image details."
          hints:
            readOnly: true
          call: "cloudflare-images.get-image"
          with:
            account_id: "tools.account_id"
            image_id: "tools.image_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: images-delete-image
          description: "Delete an image."
          hints:
            destructive: true
            idempotent: true
          call: "cloudflare-images.delete-image"
          with:
            account_id: "tools.account_id"
            image_id: "tools.image_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: images-list-variants
          description: "List image variants."
          hints:
            readOnly: true
          call: "cloudflare-images.list-image-variants"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: images-create-direct-upload
          description: "Create a direct upload URL for images."
          hints:
            readOnly: false
          call: "cloudflare-images.create-image-direct-upload"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
