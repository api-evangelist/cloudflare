naftiko: "1.0.0-alpha1"

info:
  label: "Cloudflare AI and ML"
  description: "AI and machine learning capabilities combining Workers AI model inference, AI Gateway for observability and control, and Vectorize for vector search. Used by AI/ML engineers building intelligent applications at the edge."
  tags:
    - Cloudflare
    - Artificial Intelligence
    - Machine Learning
    - Vector Database
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      CLOUDFLARE_API_TOKEN: CLOUDFLARE_API_TOKEN

capability:
  consumes:
    - import: cloudflare-workers-ai
      location: ./shared/workers-ai.yaml
    - import: cloudflare-ai-gateway
      location: ./shared/ai-gateway.yaml
    - import: cloudflare-vectorize
      location: ./shared/vectorize.yaml

  exposes:
    - type: rest
      port: 8082
      namespace: ai-ml-api
      description: "Unified REST API for Cloudflare AI and ML services."
      resources:
        - path: /v1/chat-completions
          name: chat-completions
          description: "Chat completions."
          operations:
            - method: POST
              name: create-chat-completion
              description: "Create a chat completion."
              call: "cloudflare-workers-ai.create-chat-completion"
              with:
                account_id: "rest.account_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/embeddings
          name: embeddings
          description: "Text embeddings."
          operations:
            - method: POST
              name: create-embeddings
              description: "Generate text embeddings."
              call: "cloudflare-workers-ai.create-embeddings"
              with:
                account_id: "rest.account_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/ai-gateways
          name: ai-gateways
          description: "AI Gateway management."
          operations:
            - method: GET
              name: list-ai-gateways
              description: "List AI gateways."
              call: "cloudflare-ai-gateway.list-ai-gateways"
              with:
                account_id: "rest.account_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/vectorize-indexes
          name: vectorize-indexes
          description: "Vectorize index management."
          operations:
            - method: GET
              name: list-vectorize-indexes
              description: "List Vectorize indexes."
              call: "cloudflare-vectorize.list-vectorize-indexes"
              with:
                account_id: "rest.account_id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9082
      namespace: ai-ml-mcp
      transport: http
      description: "MCP server for AI-assisted Cloudflare AI and ML management."
      tools:
        - name: ai-execute-model
          description: "Run an AI model."
          hints:
            readOnly: true
          call: "cloudflare-workers-ai.execute-ai-model"
          with:
            account_id: "tools.account_id"
            model_name: "tools.model_name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: ai-create-chat-completion
          description: "Create a chat completion."
          hints:
            readOnly: true
          call: "cloudflare-workers-ai.create-chat-completion"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: ai-create-embeddings
          description: "Generate text embeddings."
          hints:
            readOnly: true
          call: "cloudflare-workers-ai.create-embeddings"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: ai-create-text-completion
          description: "Create a text completion."
          hints:
            readOnly: true
          call: "cloudflare-workers-ai.create-text-completion"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: ai-create-response
          description: "Create an AI response."
          hints:
            readOnly: true
          call: "cloudflare-workers-ai.create-response"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: gateway-list-gateways
          description: "List AI Gateway instances."
          hints:
            readOnly: true
            openWorld: true
          call: "cloudflare-ai-gateway.list-ai-gateways"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: gateway-create-gateway
          description: "Create an AI Gateway."
          hints:
            readOnly: false
          call: "cloudflare-ai-gateway.create-ai-gateway"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: gateway-get-gateway
          description: "Get AI Gateway details."
          hints:
            readOnly: true
          call: "cloudflare-ai-gateway.get-ai-gateway"
          with:
            account_id: "tools.account_id"
            gateway_id: "tools.gateway_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: gateway-list-logs
          description: "List AI Gateway logs."
          hints:
            readOnly: true
          call: "cloudflare-ai-gateway.list-ai-gateway-logs"
          with:
            account_id: "tools.account_id"
            gateway_id: "tools.gateway_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: gateway-delete-gateway
          description: "Delete an AI Gateway."
          hints:
            destructive: true
            idempotent: true
          call: "cloudflare-ai-gateway.delete-ai-gateway"
          with:
            account_id: "tools.account_id"
            gateway_id: "tools.gateway_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: vectorize-list-indexes
          description: "List Vectorize indexes."
          hints:
            readOnly: true
            openWorld: true
          call: "cloudflare-vectorize.list-vectorize-indexes"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: vectorize-create-index
          description: "Create a Vectorize index."
          hints:
            readOnly: false
          call: "cloudflare-vectorize.create-vectorize-index"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: vectorize-query-vectors
          description: "Perform similarity query."
          hints:
            readOnly: true
          call: "cloudflare-vectorize.query-vectors"
          with:
            account_id: "tools.account_id"
            index_name: "tools.index_name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: vectorize-insert-vectors
          description: "Insert vectors into an index."
          hints:
            readOnly: false
          call: "cloudflare-vectorize.insert-vectors"
          with:
            account_id: "tools.account_id"
            index_name: "tools.index_name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: vectorize-delete-index
          description: "Delete a Vectorize index."
          hints:
            destructive: true
            idempotent: true
          call: "cloudflare-vectorize.delete-vectorize-index"
          with:
            account_id: "tools.account_id"
            index_name: "tools.index_name"
          outputParameters:
            - type: object
              mapping: "$."
