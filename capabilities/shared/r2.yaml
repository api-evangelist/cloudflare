naftiko: "1.0.0-alpha1"

info:
  label: "Cloudflare R2"
  description: "S3-compatible object storage with zero egress fees for creating and managing buckets, uploading and retrieving objects."
  tags:
    - Cloudflare
    - Object Storage
    - S3 Compatible
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      CLOUDFLARE_API_TOKEN: CLOUDFLARE_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: cloudflare-r2
      baseUri: https://api.cloudflare.com/client/v4
      description: "Cloudflare R2 API for managing object storage buckets and configuration."
      authentication:
        type: bearer
        token: "{{CLOUDFLARE_API_TOKEN}}"
      resources:
        - name: buckets
          path: /accounts/{account_id}/r2/buckets
          description: "Manage R2 storage buckets."
          operations:
            - name: list-r2-buckets
              method: GET
              description: "List all R2 buckets for an account."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-r2-bucket
              method: POST
              description: "Create a new R2 bucket."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  locationHint: "{{tools.location_hint}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: bucket
          path: /accounts/{account_id}/r2/buckets/{bucket_name}
          description: "Manage a specific R2 bucket."
          operations:
            - name: get-r2-bucket
              method: GET
              description: "Get R2 bucket details."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
                - name: bucket_name
                  in: path
                  type: string
                  required: true
                  description: "Bucket name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-r2-bucket
              method: DELETE
              description: "Delete an R2 bucket."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
                - name: bucket_name
                  in: path
                  type: string
                  required: true
                  description: "Bucket name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: bucket-objects
          path: /accounts/{account_id}/r2/buckets/{bucket_name}/objects
          description: "List objects in an R2 bucket."
          operations:
            - name: list-r2-objects
              method: GET
              description: "List objects in a bucket."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
                - name: bucket_name
                  in: path
                  type: string
                  required: true
                  description: "Bucket name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8104
      namespace: cloudflare-r2-api
      resources:
        - path: /v1/buckets
          name: buckets
          description: "R2 bucket management."
          operations:
            - method: GET
              name: list-r2-buckets
              description: "List R2 buckets."
              call: "cloudflare-r2.list-r2-buckets"
              with:
                account_id: "rest.account_id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9104
      namespace: cloudflare-r2-mcp
      transport: http
      tools:
        - name: list-r2-buckets
          description: "List all R2 buckets."
          hints:
            readOnly: true
            openWorld: true
          call: "cloudflare-r2.list-r2-buckets"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-r2-bucket
          description: "Create a new R2 bucket."
          hints:
            readOnly: false
          call: "cloudflare-r2.create-r2-bucket"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-r2-bucket
          description: "Get R2 bucket details."
          hints:
            readOnly: true
          call: "cloudflare-r2.get-r2-bucket"
          with:
            account_id: "tools.account_id"
            bucket_name: "tools.bucket_name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-r2-bucket
          description: "Delete an R2 bucket."
          hints:
            destructive: true
            idempotent: true
          call: "cloudflare-r2.delete-r2-bucket"
          with:
            account_id: "tools.account_id"
            bucket_name: "tools.bucket_name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-r2-objects
          description: "List objects in an R2 bucket."
          hints:
            readOnly: true
          call: "cloudflare-r2.list-r2-objects"
          with:
            account_id: "tools.account_id"
            bucket_name: "tools.bucket_name"
          outputParameters:
            - type: object
              mapping: "$."
