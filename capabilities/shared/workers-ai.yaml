naftiko: "1.0.0-alpha1"

info:
  label: "Cloudflare Workers AI"
  description: "Run machine learning models on Cloudflare's global network via REST API including text generation, embeddings, image classification, and speech recognition."
  tags:
    - Cloudflare
    - Artificial Intelligence
    - Machine Learning
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      CLOUDFLARE_API_TOKEN: CLOUDFLARE_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: cloudflare-workers-ai
      baseUri: https://api.cloudflare.com/client/v4
      description: "Cloudflare Workers AI API for running ML models at the edge."
      authentication:
        type: bearer
        token: "{{CLOUDFLARE_API_TOKEN}}"
      resources:
        - name: ai-models
          path: /accounts/{account_id}/ai/run/{model_name}
          description: "Execute AI models."
          operations:
            - name: execute-ai-model
              method: POST
              description: "Run an AI model with the given input."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
                - name: model_name
                  in: path
                  type: string
                  required: true
                  description: "Model name to execute."
              body:
                type: json
                data:
                  prompt: "{{tools.prompt}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: chat-completions
          path: /accounts/{account_id}/ai/v1/chat/completions
          description: "OpenAI-compatible chat completions."
          operations:
            - name: create-chat-completion
              method: POST
              description: "Create a chat completion using OpenAI-compatible endpoint."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
              body:
                type: json
                data:
                  model: "{{tools.model}}"
                  messages: "{{tools.messages}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: embeddings
          path: /accounts/{account_id}/ai/v1/embeddings
          description: "Generate text embeddings."
          operations:
            - name: create-embeddings
              method: POST
              description: "Create embeddings for input text."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
              body:
                type: json
                data:
                  model: "{{tools.model}}"
                  input: "{{tools.input}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: text-completions
          path: /accounts/{account_id}/ai/v1/completions
          description: "Text completions."
          operations:
            - name: create-text-completion
              method: POST
              description: "Create a text completion."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
              body:
                type: json
                data:
                  model: "{{tools.model}}"
                  prompt: "{{tools.prompt}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: responses
          path: /accounts/{account_id}/ai/v1/responses
          description: "Create AI responses."
          operations:
            - name: create-response
              method: POST
              description: "Create an AI response."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
              body:
                type: json
                data:
                  model: "{{tools.model}}"
                  input: "{{tools.input}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: cloudflare-workers-ai-api
      resources:
        - path: /v1/ai-models
          name: ai-models
          description: "AI model execution."
          operations:
            - method: POST
              name: execute-ai-model
              description: "Execute an AI model."
              call: "cloudflare-workers-ai.execute-ai-model"
              with:
                account_id: "rest.account_id"
                model_name: "rest.model_name"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: cloudflare-workers-ai-mcp
      transport: http
      tools:
        - name: execute-ai-model
          description: "Run an AI model with given input."
          hints:
            readOnly: true
          call: "cloudflare-workers-ai.execute-ai-model"
          with:
            account_id: "tools.account_id"
            model_name: "tools.model_name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-chat-completion
          description: "Create a chat completion (OpenAI-compatible)."
          hints:
            readOnly: true
          call: "cloudflare-workers-ai.create-chat-completion"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-embeddings
          description: "Generate text embeddings."
          hints:
            readOnly: true
          call: "cloudflare-workers-ai.create-embeddings"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-text-completion
          description: "Create a text completion."
          hints:
            readOnly: true
          call: "cloudflare-workers-ai.create-text-completion"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-response
          description: "Create an AI response."
          hints:
            readOnly: true
          call: "cloudflare-workers-ai.create-response"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
