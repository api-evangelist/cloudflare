naftiko: "1.0.0-alpha1"

info:
  label: "Cloudflare Logpush"
  description: "Configure jobs that push logs to storage services, SIEMs, and log management providers with support for multiple datasets."
  tags:
    - Cloudflare
    - Logs
    - Observability
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      CLOUDFLARE_API_TOKEN: CLOUDFLARE_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: cloudflare-logpush
      baseUri: https://api.cloudflare.com/client/v4
      description: "Cloudflare Logpush API for managing log push jobs and datasets."
      authentication:
        type: bearer
        token: "{{CLOUDFLARE_API_TOKEN}}"
      resources:
        - name: jobs
          path: /zones/{zone_id}/logpush/jobs
          description: "Manage Logpush jobs."
          operations:
            - name: list-logpush-jobs
              method: GET
              description: "List all Logpush jobs for a zone."
              inputParameters:
                - name: zone_id
                  in: path
                  type: string
                  required: true
                  description: "Zone identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-logpush-job
              method: POST
              description: "Create a new Logpush job."
              inputParameters:
                - name: zone_id
                  in: path
                  type: string
                  required: true
                  description: "Zone identifier."
              body:
                type: json
                data:
                  destination_conf: "{{tools.destination_conf}}"
                  dataset: "{{tools.dataset}}"
                  enabled: "{{tools.enabled}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: job
          path: /zones/{zone_id}/logpush/jobs/{job_id}
          description: "Manage a specific Logpush job."
          operations:
            - name: get-logpush-job
              method: GET
              description: "Get Logpush job details."
              inputParameters:
                - name: zone_id
                  in: path
                  type: string
                  required: true
                  description: "Zone identifier."
                - name: job_id
                  in: path
                  type: string
                  required: true
                  description: "Job identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-logpush-job
              method: DELETE
              description: "Delete a Logpush job."
              inputParameters:
                - name: zone_id
                  in: path
                  type: string
                  required: true
                  description: "Zone identifier."
                - name: job_id
                  in: path
                  type: string
                  required: true
                  description: "Job identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: datasets
          path: /zones/{zone_id}/logpush/datasets/{dataset}/fields
          description: "List dataset fields."
          operations:
            - name: list-dataset-fields
              method: GET
              description: "List available fields for a dataset."
              inputParameters:
                - name: zone_id
                  in: path
                  type: string
                  required: true
                  description: "Zone identifier."
                - name: dataset
                  in: path
                  type: string
                  required: true
                  description: "Dataset name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8114
      namespace: cloudflare-logpush-api
      resources:
        - path: /v1/logpush-jobs
          name: logpush-jobs
          description: "Logpush job management."
          operations:
            - method: GET
              name: list-logpush-jobs
              description: "List Logpush jobs."
              call: "cloudflare-logpush.list-logpush-jobs"
              with:
                zone_id: "rest.zone_id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9114
      namespace: cloudflare-logpush-mcp
      transport: http
      tools:
        - name: list-logpush-jobs
          description: "List all Logpush jobs."
          hints:
            readOnly: true
            openWorld: true
          call: "cloudflare-logpush.list-logpush-jobs"
          with:
            zone_id: "tools.zone_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-logpush-job
          description: "Create a Logpush job."
          hints:
            readOnly: false
          call: "cloudflare-logpush.create-logpush-job"
          with:
            zone_id: "tools.zone_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-logpush-job
          description: "Get Logpush job details."
          hints:
            readOnly: true
          call: "cloudflare-logpush.get-logpush-job"
          with:
            zone_id: "tools.zone_id"
            job_id: "tools.job_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-logpush-job
          description: "Delete a Logpush job."
          hints:
            destructive: true
            idempotent: true
          call: "cloudflare-logpush.delete-logpush-job"
          with:
            zone_id: "tools.zone_id"
            job_id: "tools.job_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-dataset-fields
          description: "List available fields for a dataset."
          hints:
            readOnly: true
          call: "cloudflare-logpush.list-dataset-fields"
          with:
            zone_id: "tools.zone_id"
            dataset: "tools.dataset"
          outputParameters:
            - type: object
              mapping: "$."
