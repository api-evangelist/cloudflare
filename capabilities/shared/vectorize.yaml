naftiko: "1.0.0-alpha1"

info:
  label: "Cloudflare Vectorize"
  description: "Globally distributed vector database for building AI-powered applications with similarity search, recommendations, and classification."
  tags:
    - Cloudflare
    - Vector Database
    - AI
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      CLOUDFLARE_API_TOKEN: CLOUDFLARE_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: cloudflare-vectorize
      baseUri: https://api.cloudflare.com/client/v4
      description: "Cloudflare Vectorize API for managing vector indexes and performing similarity queries."
      authentication:
        type: bearer
        token: "{{CLOUDFLARE_API_TOKEN}}"
      resources:
        - name: indexes
          path: /accounts/{account_id}/vectorize/v2/indexes
          description: "Manage vector indexes."
          operations:
            - name: list-vectorize-indexes
              method: GET
              description: "List all Vectorize indexes."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-vectorize-index
              method: POST
              description: "Create a new Vectorize index."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  config: "{{tools.config}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: index
          path: /accounts/{account_id}/vectorize/v2/indexes/{index_name}
          description: "Manage a specific vector index."
          operations:
            - name: get-vectorize-index
              method: GET
              description: "Get Vectorize index details."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
                - name: index_name
                  in: path
                  type: string
                  required: true
                  description: "Index name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-vectorize-index
              method: DELETE
              description: "Delete a Vectorize index."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
                - name: index_name
                  in: path
                  type: string
                  required: true
                  description: "Index name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: vectors
          path: /accounts/{account_id}/vectorize/v2/indexes/{index_name}/insert
          description: "Insert vectors."
          operations:
            - name: insert-vectors
              method: POST
              description: "Insert vectors into an index."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
                - name: index_name
                  in: path
                  type: string
                  required: true
                  description: "Index name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: query
          path: /accounts/{account_id}/vectorize/v2/indexes/{index_name}/query
          description: "Query vectors."
          operations:
            - name: query-vectors
              method: POST
              description: "Perform a similarity query on vectors."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
                - name: index_name
                  in: path
                  type: string
                  required: true
                  description: "Index name."
              body:
                type: json
                data:
                  vector: "{{tools.vector}}"
                  topK: "{{tools.top_k}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8109
      namespace: cloudflare-vectorize-api
      resources:
        - path: /v1/vectorize-indexes
          name: vectorize-indexes
          description: "Vectorize index management."
          operations:
            - method: GET
              name: list-vectorize-indexes
              description: "List Vectorize indexes."
              call: "cloudflare-vectorize.list-vectorize-indexes"
              with:
                account_id: "rest.account_id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9109
      namespace: cloudflare-vectorize-mcp
      transport: http
      tools:
        - name: list-vectorize-indexes
          description: "List all Vectorize indexes."
          hints:
            readOnly: true
            openWorld: true
          call: "cloudflare-vectorize.list-vectorize-indexes"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-vectorize-index
          description: "Create a new Vectorize index."
          hints:
            readOnly: false
          call: "cloudflare-vectorize.create-vectorize-index"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-vectorize-index
          description: "Get Vectorize index details."
          hints:
            readOnly: true
          call: "cloudflare-vectorize.get-vectorize-index"
          with:
            account_id: "tools.account_id"
            index_name: "tools.index_name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: query-vectors
          description: "Perform similarity query on vectors."
          hints:
            readOnly: true
          call: "cloudflare-vectorize.query-vectors"
          with:
            account_id: "tools.account_id"
            index_name: "tools.index_name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: insert-vectors
          description: "Insert vectors into an index."
          hints:
            readOnly: false
          call: "cloudflare-vectorize.insert-vectors"
          with:
            account_id: "tools.account_id"
            index_name: "tools.index_name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-vectorize-index
          description: "Delete a Vectorize index."
          hints:
            destructive: true
            idempotent: true
          call: "cloudflare-vectorize.delete-vectorize-index"
          with:
            account_id: "tools.account_id"
            index_name: "tools.index_name"
          outputParameters:
            - type: object
              mapping: "$."
