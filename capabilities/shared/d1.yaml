naftiko: "1.0.0-alpha1"

info:
  label: "Cloudflare D1"
  description: "Serverless SQL databases on Cloudflare's network for creating, managing, and querying databases via REST API."
  tags:
    - Cloudflare
    - Database
    - SQL
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      CLOUDFLARE_API_TOKEN: CLOUDFLARE_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: cloudflare-d1
      baseUri: https://api.cloudflare.com/client/v4
      description: "Cloudflare D1 API for managing serverless SQL databases."
      authentication:
        type: bearer
        token: "{{CLOUDFLARE_API_TOKEN}}"
      resources:
        - name: databases
          path: /accounts/{account_id}/d1/database
          description: "Manage D1 databases."
          operations:
            - name: list-databases
              method: GET
              description: "List all D1 databases."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-database
              method: POST
              description: "Create a new D1 database."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: database
          path: /accounts/{account_id}/d1/database/{database_id}
          description: "Manage a specific D1 database."
          operations:
            - name: get-database
              method: GET
              description: "Get D1 database details."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
                - name: database_id
                  in: path
                  type: string
                  required: true
                  description: "Database identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-database
              method: DELETE
              description: "Delete a D1 database."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
                - name: database_id
                  in: path
                  type: string
                  required: true
                  description: "Database identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: database-query
          path: /accounts/{account_id}/d1/database/{database_id}/query
          description: "Execute queries on a D1 database."
          operations:
            - name: query-database
              method: POST
              description: "Execute a SQL query on a D1 database."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
                - name: database_id
                  in: path
                  type: string
                  required: true
                  description: "Database identifier."
              body:
                type: json
                data:
                  sql: "{{tools.sql}}"
                  params: "{{tools.params}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8105
      namespace: cloudflare-d1-api
      resources:
        - path: /v1/databases
          name: databases
          description: "D1 database management."
          operations:
            - method: GET
              name: list-databases
              description: "List D1 databases."
              call: "cloudflare-d1.list-databases"
              with:
                account_id: "rest.account_id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9105
      namespace: cloudflare-d1-mcp
      transport: http
      tools:
        - name: list-databases
          description: "List all D1 databases."
          hints:
            readOnly: true
            openWorld: true
          call: "cloudflare-d1.list-databases"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-database
          description: "Create a new D1 database."
          hints:
            readOnly: false
          call: "cloudflare-d1.create-database"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-database
          description: "Get D1 database details."
          hints:
            readOnly: true
          call: "cloudflare-d1.get-database"
          with:
            account_id: "tools.account_id"
            database_id: "tools.database_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-database
          description: "Delete a D1 database."
          hints:
            destructive: true
            idempotent: true
          call: "cloudflare-d1.delete-database"
          with:
            account_id: "tools.account_id"
            database_id: "tools.database_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: query-database
          description: "Execute a SQL query on a D1 database."
          hints:
            readOnly: false
          call: "cloudflare-d1.query-database"
          with:
            account_id: "tools.account_id"
            database_id: "tools.database_id"
          outputParameters:
            - type: object
              mapping: "$."
