naftiko: "1.0.0-alpha1"

info:
  label: "Cloudflare Pages"
  description: "Build and deploy full-stack applications with Pages projects, deployments, and build management."
  tags:
    - Cloudflare
    - Deployment
    - JAMstack
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      CLOUDFLARE_API_TOKEN: CLOUDFLARE_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: cloudflare-pages
      baseUri: https://api.cloudflare.com/client/v4
      description: "Cloudflare Pages API for managing projects and deployments."
      authentication:
        type: bearer
        token: "{{CLOUDFLARE_API_TOKEN}}"
      resources:
        - name: projects
          path: /accounts/{account_id}/pages/projects
          description: "Manage Pages projects."
          operations:
            - name: list-pages-projects
              method: GET
              description: "List all Pages projects."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-pages-project
              method: POST
              description: "Create a new Pages project."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  production_branch: "{{tools.production_branch}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: project
          path: /accounts/{account_id}/pages/projects/{project_name}
          description: "Manage a specific Pages project."
          operations:
            - name: get-pages-project
              method: GET
              description: "Get Pages project details."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
                - name: project_name
                  in: path
                  type: string
                  required: true
                  description: "Project name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-pages-project
              method: DELETE
              description: "Delete a Pages project."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
                - name: project_name
                  in: path
                  type: string
                  required: true
                  description: "Project name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: deployments
          path: /accounts/{account_id}/pages/projects/{project_name}/deployments
          description: "Manage Pages deployments."
          operations:
            - name: list-pages-deployments
              method: GET
              description: "List deployments for a project."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
                - name: project_name
                  in: path
                  type: string
                  required: true
                  description: "Project name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-pages-deployment
              method: POST
              description: "Create a new deployment."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
                - name: project_name
                  in: path
                  type: string
                  required: true
                  description: "Project name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: deployment
          path: /accounts/{account_id}/pages/projects/{project_name}/deployments/{deployment_id}
          description: "Manage a specific deployment."
          operations:
            - name: get-pages-deployment
              method: GET
              description: "Get deployment details."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
                - name: project_name
                  in: path
                  type: string
                  required: true
                  description: "Project name."
                - name: deployment_id
                  in: path
                  type: string
                  required: true
                  description: "Deployment identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: rollback-pages-deployment
              method: POST
              description: "Rollback to a previous deployment."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
                - name: project_name
                  in: path
                  type: string
                  required: true
                  description: "Project name."
                - name: deployment_id
                  in: path
                  type: string
                  required: true
                  description: "Deployment identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8110
      namespace: cloudflare-pages-api
      resources:
        - path: /v1/pages-projects
          name: pages-projects
          description: "Pages project management."
          operations:
            - method: GET
              name: list-pages-projects
              description: "List Pages projects."
              call: "cloudflare-pages.list-pages-projects"
              with:
                account_id: "rest.account_id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9110
      namespace: cloudflare-pages-mcp
      transport: http
      tools:
        - name: list-pages-projects
          description: "List all Pages projects."
          hints:
            readOnly: true
            openWorld: true
          call: "cloudflare-pages.list-pages-projects"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-pages-project
          description: "Create a new Pages project."
          hints:
            readOnly: false
          call: "cloudflare-pages.create-pages-project"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-pages-project
          description: "Get Pages project details."
          hints:
            readOnly: true
          call: "cloudflare-pages.get-pages-project"
          with:
            account_id: "tools.account_id"
            project_name: "tools.project_name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-pages-deployments
          description: "List deployments for a project."
          hints:
            readOnly: true
          call: "cloudflare-pages.list-pages-deployments"
          with:
            account_id: "tools.account_id"
            project_name: "tools.project_name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: rollback-pages-deployment
          description: "Rollback to a previous deployment."
          hints:
            readOnly: false
          call: "cloudflare-pages.rollback-pages-deployment"
          with:
            account_id: "tools.account_id"
            project_name: "tools.project_name"
            deployment_id: "tools.deployment_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-pages-project
          description: "Delete a Pages project."
          hints:
            destructive: true
            idempotent: true
          call: "cloudflare-pages.delete-pages-project"
          with:
            account_id: "tools.account_id"
            project_name: "tools.project_name"
          outputParameters:
            - type: object
              mapping: "$."
