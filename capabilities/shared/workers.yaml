naftiko: "1.0.0-alpha1"

info:
  label: "Cloudflare Workers"
  description: "Deploy and manage serverless code on Cloudflare's global network including scripts, versions, deployments, routes, domains, secrets, and cron triggers."
  tags:
    - Cloudflare
    - Serverless
    - Edge Computing
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      CLOUDFLARE_API_TOKEN: CLOUDFLARE_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: cloudflare-workers
      baseUri: https://api.cloudflare.com/client/v4
      description: "Cloudflare Workers API for managing serverless scripts, deployments, and configuration."
      authentication:
        type: bearer
        token: "{{CLOUDFLARE_API_TOKEN}}"
      resources:
        - name: workers
          path: /accounts/{account_id}/workers/workers
          description: "Manage Worker resources."
          operations:
            - name: list-workers
              method: GET
              description: "List all Workers for an account."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: scripts
          path: /accounts/{account_id}/workers/scripts
          description: "Manage Worker scripts."
          operations:
            - name: list-worker-scripts
              method: GET
              description: "List all Worker scripts for an account."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: upload-worker-script
              method: PUT
              description: "Upload a Worker script."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
                - name: script_name
                  in: path
                  type: string
                  required: true
                  description: "Script name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-worker-script
              method: DELETE
              description: "Delete a Worker script."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
                - name: script_name
                  in: path
                  type: string
                  required: true
                  description: "Script name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: deployments
          path: /accounts/{account_id}/workers/scripts/{script_name}/deployments
          description: "Manage Worker deployments."
          operations:
            - name: list-deployments
              method: GET
              description: "List deployments for a Worker script."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
                - name: script_name
                  in: path
                  type: string
                  required: true
                  description: "Script name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-deployment
              method: POST
              description: "Create a deployment for a Worker script."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
                - name: script_name
                  in: path
                  type: string
                  required: true
                  description: "Script name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: routes
          path: /zones/{zone_id}/workers/routes
          description: "Manage Worker routes."
          operations:
            - name: list-routes
              method: GET
              description: "List Worker routes for a zone."
              inputParameters:
                - name: zone_id
                  in: path
                  type: string
                  required: true
                  description: "Zone identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-route
              method: POST
              description: "Create a Worker route."
              inputParameters:
                - name: zone_id
                  in: path
                  type: string
                  required: true
                  description: "Zone identifier."
              body:
                type: json
                data:
                  pattern: "{{tools.pattern}}"
                  script: "{{tools.script}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: secrets
          path: /accounts/{account_id}/workers/scripts/{script_name}/secrets
          description: "Manage Worker secrets."
          operations:
            - name: list-secrets
              method: GET
              description: "List secrets for a Worker script."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
                - name: script_name
                  in: path
                  type: string
                  required: true
                  description: "Script name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: cloudflare-workers-api
      resources:
        - path: /v1/workers
          name: workers
          description: "Worker management."
          operations:
            - method: GET
              name: list-workers
              description: "List all Workers."
              call: "cloudflare-workers.list-workers"
              with:
                account_id: "rest.account_id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: cloudflare-workers-mcp
      transport: http
      tools:
        - name: list-workers
          description: "List all Workers for an account."
          hints:
            readOnly: true
            openWorld: true
          call: "cloudflare-workers.list-workers"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-worker-scripts
          description: "List Worker scripts."
          hints:
            readOnly: true
          call: "cloudflare-workers.list-worker-scripts"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: upload-worker-script
          description: "Upload a Worker script."
          hints:
            readOnly: false
            idempotent: true
          call: "cloudflare-workers.upload-worker-script"
          with:
            account_id: "tools.account_id"
            script_name: "tools.script_name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-worker-script
          description: "Delete a Worker script."
          hints:
            destructive: true
            idempotent: true
          call: "cloudflare-workers.delete-worker-script"
          with:
            account_id: "tools.account_id"
            script_name: "tools.script_name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-deployments
          description: "List deployments for a Worker."
          hints:
            readOnly: true
          call: "cloudflare-workers.list-deployments"
          with:
            account_id: "tools.account_id"
            script_name: "tools.script_name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-deployment
          description: "Create a Worker deployment."
          hints:
            readOnly: false
          call: "cloudflare-workers.create-deployment"
          with:
            account_id: "tools.account_id"
            script_name: "tools.script_name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-routes
          description: "List Worker routes for a zone."
          hints:
            readOnly: true
          call: "cloudflare-workers.list-routes"
          with:
            zone_id: "tools.zone_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-secrets
          description: "List secrets for a Worker."
          hints:
            readOnly: true
          call: "cloudflare-workers.list-secrets"
          with:
            account_id: "tools.account_id"
            script_name: "tools.script_name"
          outputParameters:
            - type: object
              mapping: "$."
