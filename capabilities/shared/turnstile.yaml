naftiko: "1.0.0-alpha1"

info:
  label: "Cloudflare Turnstile"
  description: "CAPTCHA replacement that verifies visitors without showing a challenge, with widget management and token verification."
  tags:
    - Cloudflare
    - Security
    - Bot Protection
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      CLOUDFLARE_API_TOKEN: CLOUDFLARE_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: cloudflare-turnstile
      baseUri: https://api.cloudflare.com/client/v4
      description: "Cloudflare Turnstile API for managing CAPTCHA widgets and verifying tokens."
      authentication:
        type: bearer
        token: "{{CLOUDFLARE_API_TOKEN}}"
      resources:
        - name: widgets
          path: /accounts/{account_id}/challenges/widgets
          description: "Manage Turnstile widgets."
          operations:
            - name: list-turnstile-widgets
              method: GET
              description: "List all Turnstile widgets."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-turnstile-widget
              method: POST
              description: "Create a new Turnstile widget."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  domains: "{{tools.domains}}"
                  mode: "{{tools.mode}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: widget
          path: /accounts/{account_id}/challenges/widgets/{sitekey}
          description: "Manage a specific Turnstile widget."
          operations:
            - name: get-turnstile-widget
              method: GET
              description: "Get Turnstile widget details."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
                - name: sitekey
                  in: path
                  type: string
                  required: true
                  description: "Widget site key."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-turnstile-widget
              method: DELETE
              description: "Delete a Turnstile widget."
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account identifier."
                - name: sitekey
                  in: path
                  type: string
                  required: true
                  description: "Widget site key."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: verify
          path: /siteverify
          description: "Verify Turnstile tokens."
          operations:
            - name: verify-turnstile-token
              method: POST
              description: "Verify a Turnstile response token."
              body:
                type: json
                data:
                  secret: "{{tools.secret}}"
                  response: "{{tools.response}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8113
      namespace: cloudflare-turnstile-api
      resources:
        - path: /v1/turnstile-widgets
          name: turnstile-widgets
          description: "Turnstile widget management."
          operations:
            - method: GET
              name: list-turnstile-widgets
              description: "List Turnstile widgets."
              call: "cloudflare-turnstile.list-turnstile-widgets"
              with:
                account_id: "rest.account_id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9113
      namespace: cloudflare-turnstile-mcp
      transport: http
      tools:
        - name: list-turnstile-widgets
          description: "List all Turnstile widgets."
          hints:
            readOnly: true
            openWorld: true
          call: "cloudflare-turnstile.list-turnstile-widgets"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-turnstile-widget
          description: "Create a Turnstile widget."
          hints:
            readOnly: false
          call: "cloudflare-turnstile.create-turnstile-widget"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-turnstile-widget
          description: "Get Turnstile widget details."
          hints:
            readOnly: true
          call: "cloudflare-turnstile.get-turnstile-widget"
          with:
            account_id: "tools.account_id"
            sitekey: "tools.sitekey"
          outputParameters:
            - type: object
              mapping: "$."
        - name: verify-turnstile-token
          description: "Verify a Turnstile response token."
          hints:
            readOnly: true
          call: "cloudflare-turnstile.verify-turnstile-token"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-turnstile-widget
          description: "Delete a Turnstile widget."
          hints:
            destructive: true
            idempotent: true
          call: "cloudflare-turnstile.delete-turnstile-widget"
          with:
            account_id: "tools.account_id"
            sitekey: "tools.sitekey"
          outputParameters:
            - type: object
              mapping: "$."
