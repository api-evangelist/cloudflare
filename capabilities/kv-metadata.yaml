naftiko: 1.0.0-alpha2
info:
  label: Cloudflare KV API — Metadata
  description: 'Cloudflare KV API — Metadata. 1 operations. Lead operation: Cloudflare Read Key Metadata. Self-contained Naftiko
    capability covering one Cloudflare business surface.'
  tags:
  - Cloudflare
  - Metadata
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CLOUDFLARE_API_KEY: CLOUDFLARE_API_KEY
capability:
  consumes:
  - type: http
    namespace: kv-metadata
    baseUri: https://api.cloudflare.com/client/v4
    description: Cloudflare KV API — Metadata business capability. Self-contained, no shared references.
    resources:
    - name: accounts-account_id-storage-kv-namespaces-namespace_id-metadata-key_name
      path: /accounts/{account_id}/storage/kv/namespaces/{namespace_id}/metadata/{key_name}
      operations:
      - name: readkvmetadata
        method: GET
        description: Cloudflare Read Key Metadata
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.CLOUDFLARE_API_KEY}}'
  exposes:
  - type: rest
    namespace: kv-metadata-rest
    port: 8080
    description: REST adapter for Cloudflare KV API — Metadata. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/accounts/{account-id}/storage/kv/namespaces/{namespace-id}/metadata/{key-name}
      name: accounts-account-id-storage-kv-namespaces-namespace-id-metadata-key-name
      description: REST surface for accounts-account_id-storage-kv-namespaces-namespace_id-metadata-key_name.
      operations:
      - method: GET
        name: readkvmetadata
        description: Cloudflare Read Key Metadata
        call: kv-metadata.readkvmetadata
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: kv-metadata-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cloudflare KV API — Metadata. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: cloudflare-read-key-metadata
      description: Cloudflare Read Key Metadata
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kv-metadata.readkvmetadata
      outputParameters:
      - type: object
        mapping: $.
