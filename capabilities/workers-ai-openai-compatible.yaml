    port: 9090
    transport: http
    description: MCP adapter for Cloudflare Workers AI API — OpenAI Compatible. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: cloudflare-create-chat-completion
      description: Cloudflare Create Chat Completion
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: workers-ai-openai-compatible.createchatcompletion
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
