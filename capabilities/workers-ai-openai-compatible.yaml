naftiko: 1.0.0-alpha2
info:
  label: Cloudflare Workers AI API — OpenAI Compatible
  description: 'Cloudflare Workers AI API — OpenAI Compatible. 4 operations. Lead operation: Cloudflare Create Chat Completion.
    Self-contained Naftiko capability covering one Cloudflare business surface.'
  tags:
  - Cloudflare
  - OpenAI Compatible
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CLOUDFLARE_API_KEY: CLOUDFLARE_API_KEY
capability:
