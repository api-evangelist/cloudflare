naftiko: 1.0.0-alpha2
info:
  label: Cloudflare D1 API — Queries
  description: 'Cloudflare D1 API — Queries. 2 operations. Lead operation: Cloudflare Query D1 Database. Self-contained Naftiko
    capability covering one Cloudflare business surface.'
  tags:
  - Cloudflare
  - Queries
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CLOUDFLARE_API_KEY: CLOUDFLARE_API_KEY
capability:
  consumes:
  - type: http
    namespace: d1-queries
    baseUri: https://api.cloudflare.com/client/v4
    description: Cloudflare D1 API — Queries business capability. Self-contained, no shared references.
    resources:
    - name: accounts-account_id-d1-database-database_id-query
      path: /accounts/{account_id}/d1/database/{database_id}/query
      operations:
      - name: queryd1database
        method: POST
        description: Cloudflare Query D1 Database
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: accounts-account_id-d1-database-database_id-raw
      path: /accounts/{account_id}/d1/database/{database_id}/raw
      operations:
      - name: rawqueryd1database
        method: POST
        description: Cloudflare Raw Query D1 Database
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.CLOUDFLARE_API_KEY}}'
  exposes:
  - type: rest
    namespace: d1-queries-rest
    port: 8080
    description: REST adapter for Cloudflare D1 API — Queries. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/accounts/{account-id}/d1/database/{database-id}/query
      name: accounts-account-id-d1-database-database-id-query
      description: REST surface for accounts-account_id-d1-database-database_id-query.
      operations:
      - method: POST
        name: queryd1database
        description: Cloudflare Query D1 Database
        call: d1-queries.queryd1database
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/accounts/{account-id}/d1/database/{database-id}/raw
      name: accounts-account-id-d1-database-database-id-raw
      description: REST surface for accounts-account_id-d1-database-database_id-raw.
      operations:
      - method: POST
        name: rawqueryd1database
        description: Cloudflare Raw Query D1 Database
        call: d1-queries.rawqueryd1database
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: d1-queries-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cloudflare D1 API — Queries. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: cloudflare-query-d1-database
      description: Cloudflare Query D1 Database
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: d1-queries.queryd1database
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: cloudflare-raw-query-d1-database
      description: Cloudflare Raw Query D1 Database
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: d1-queries.rawqueryd1database
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
