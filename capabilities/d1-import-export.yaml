naftiko: 1.0.0-alpha2
info:
  label: Cloudflare D1 API — Import/Export
  description: 'Cloudflare D1 API — Import/Export. 2 operations. Lead operation: Cloudflare Export D1 Database. Self-contained
    Naftiko capability covering one Cloudflare business surface.'
  tags:
  - Cloudflare
  - Import/Export
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CLOUDFLARE_API_KEY: CLOUDFLARE_API_KEY
capability:
  consumes:
  - type: http
    namespace: d1-import-export
    baseUri: https://api.cloudflare.com/client/v4
    description: Cloudflare D1 API — Import/Export business capability. Self-contained, no shared references.
    resources:
    - name: accounts-account_id-d1-database-database_id-export
      path: /accounts/{account_id}/d1/database/{database_id}/export
      operations:
      - name: exportd1database
        method: POST
        description: Cloudflare Export D1 Database
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: accounts-account_id-d1-database-database_id-import
      path: /accounts/{account_id}/d1/database/{database_id}/import
      operations:
      - name: importd1database
        method: POST
        description: Cloudflare Import Sql Into D1 Database
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.CLOUDFLARE_API_KEY}}'
  exposes:
  - type: rest
    namespace: d1-import-export-rest
    port: 8080
    description: REST adapter for Cloudflare D1 API — Import/Export. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/accounts/{account-id}/d1/database/{database-id}/export
      name: accounts-account-id-d1-database-database-id-export
      description: REST surface for accounts-account_id-d1-database-database_id-export.
      operations:
      - method: POST
        name: exportd1database
        description: Cloudflare Export D1 Database
        call: d1-import-export.exportd1database
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/accounts/{account-id}/d1/database/{database-id}/import
      name: accounts-account-id-d1-database-database-id-import
      description: REST surface for accounts-account_id-d1-database-database_id-import.
      operations:
      - method: POST
        name: importd1database
        description: Cloudflare Import Sql Into D1 Database
        call: d1-import-export.importd1database
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: d1-import-export-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cloudflare D1 API — Import/Export. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: cloudflare-export-d1-database
      description: Cloudflare Export D1 Database
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: d1-import-export.exportd1database
      outputParameters:
      - type: object
        mapping: $.
    - name: cloudflare-import-sql-d1-database
      description: Cloudflare Import Sql Into D1 Database
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: d1-import-export.importd1database
      outputParameters:
      - type: object
        mapping: $.
