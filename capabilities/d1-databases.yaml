    resources:
    - name: accounts-account_id-d1-database
      path: /accounts/{account_id}/d1/database
      operations:
      - name: listd1databases
        method: GET
        description: Cloudflare List D1 Databases
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page
          in: query
          type: integer
          description: Page number of results.
        - name: per_page
          in: query
          type: integer
          description: Number of results per page.
        - name: name
          in: query
          type: string
          description: Filter databases by name.
      - name: created1database
        method: POST
        description: Cloudflare Create D1 Database
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: accounts-account_id-d1-database-database_id
      path: /accounts/{account_id}/d1/database/{database_id}
      operations:
      - name: getd1database
        method: GET
        description: Cloudflare Get D1 Database
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updated1database
        method: PUT
        description: Cloudflare Update D1 Database
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleted1database
        method: DELETE
        description: Cloudflare Delete D1 Database
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.CLOUDFLARE_API_KEY}}'
  exposes:
