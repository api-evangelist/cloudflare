    namespace: d1-databases-rest
    port: 8080
    description: REST adapter for Cloudflare D1 API — Databases. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/accounts/{account-id}/d1/database
      name: accounts-account-id-d1-database
      description: REST surface for accounts-account_id-d1-database.
      operations:
      - method: GET
        name: listd1databases
        description: Cloudflare List D1 Databases
        call: d1-databases.listd1databases
        with:
          page: rest.page
          per_page: rest.per_page
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
