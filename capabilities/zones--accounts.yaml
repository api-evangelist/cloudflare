    namespace: zones--accounts-rest
    port: 8080
    description: REST adapter for Cloudflare zones/ — Accounts. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/accounts/{account-id}/addressing/address-maps/{address-map-id}/zones/{zone-id}
      name: accounts-account-id-addressing-address-maps-address-map-id-zones-zone-id
      description: REST surface for accounts-account_id-addressing-address_maps-address_map_id-zones-zone_id.
      operations:
      - method: DELETE
        name: ipaddressmanagementaddressmapsremoveazonemembershipfromanaddressmap
        description: Cloudflare Remove a zone membership from an Address Map
        call: zones--accounts.ipaddressmanagementaddressmapsremoveazonemembershipfromanaddressmap
        with:
          zone_id: rest.zone_id
          address_map_id: rest.address_map_id
          account_id: rest.account_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: ipaddressmanagementaddressmapsaddazonemembershiptoanaddressmap
        description: Cloudflare Add a zone membership to an Address Map
        call: zones--accounts.ipaddressmanagementaddressmapsaddazonemembershiptoanaddressmap
        with:
