naftiko: 1.0.0-alpha2
info:
  label: Cloudflare zones/ — Accounts
  description: 'Cloudflare zones/ — Accounts. 2 operations. Lead operation: Cloudflare Remove a zone membership from an Address
    Map. Self-contained Naftiko capability covering one Cloudflare business surface.'
  tags:
  - Cloudflare
  - Accounts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
