    resources:
    - name: accounts-account_id-addressing-address_maps-address_map_id-zones-zone_id
      path: /accounts/{account_id}/addressing/address_maps/{address_map_id}/zones/{zone_id}
      operations:
      - name: ipaddressmanagementaddressmapsremoveazonemembershipfromanaddressmap
        method: DELETE
        description: Cloudflare Remove a zone membership from an Address Map
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: zone_id
          in: path
          type: string
          required: true
        - name: address_map_id
          in: path
          type: string
          required: true
        - name: account_id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: ipaddressmanagementaddressmapsaddazonemembershiptoanaddressmap
        method: PUT
        description: Cloudflare Add a zone membership to an Address Map
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: zone_id
          in: path
          type: string
          required: true
        - name: address_map_id
          in: path
          type: string
          required: true
        - name: account_id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
