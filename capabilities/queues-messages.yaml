    resources:
    - name: accounts-account_id-queues-queue_id-messages
      path: /accounts/{account_id}/queues/{queue_id}/messages
      operations:
      - name: sendmessage
        method: POST
        description: Cloudflare Send Message
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: accounts-account_id-queues-queue_id-messages-ack
      path: /accounts/{account_id}/queues/{queue_id}/messages/ack
      operations:
      - name: ackmessages
