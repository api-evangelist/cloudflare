    namespace: queues-messages-rest
    port: 8080
    description: REST adapter for Cloudflare Queues API — Messages. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/accounts/{account-id}/queues/{queue-id}/messages
      name: accounts-account-id-queues-queue-id-messages
      description: REST surface for accounts-account_id-queues-queue_id-messages.
      operations:
      - method: POST
        name: sendmessage
        description: Cloudflare Send Message
        call: queues-messages.sendmessage
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
