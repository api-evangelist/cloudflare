    description: Cloudflare Workers API — Versions business capability. Self-contained, no shared references.
    resources:
    - name: accounts-account_id-workers-workers-worker_id-versions
      path: /accounts/{account_id}/workers/workers/{worker_id}/versions
      operations:
      - name: listversions
        method: GET
        description: Cloudflare List Worker Versions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createversion
        method: POST
        description: Cloudflare Create Worker Version
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.CLOUDFLARE_API_KEY}}'
  exposes:
