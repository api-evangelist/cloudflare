      name: accounts-account-id-workers-workers-worker-id-versions
      description: REST surface for accounts-account_id-workers-workers-worker_id-versions.
      operations:
      - method: GET
        name: listversions
        description: Cloudflare List Worker Versions
        call: workers-versions.listversions
        outputParameters:
        - type: object
          mapping: $.
