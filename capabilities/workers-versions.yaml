        call: workers-versions.createversion
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: workers-versions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cloudflare Workers API — Versions. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: cloudflare-list-worker-versions
      description: Cloudflare List Worker Versions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: workers-versions.listversions
      outputParameters:
      - type: object
        mapping: $.
    - name: cloudflare-create-worker-version
      description: Cloudflare Create Worker Version
