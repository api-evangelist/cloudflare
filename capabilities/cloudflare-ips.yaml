naftiko: 1.0.0-alpha2
info:
  label: Cloudflare API — Ips
  description: 'Cloudflare API — Ips. 1 operations. Lead operation: Cloudflare/JD Cloud IP Details. Self-contained Naftiko
    capability covering one Cloudflare business surface.'
  tags:
  - Cloudflare
  - Ips
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CLOUDFLARE_API_KEY: CLOUDFLARE_API_KEY
capability:
  consumes:
  - type: http
    namespace: cloudflare-ips
    baseUri: https://api.cloudflare.com/client/v4
    description: Cloudflare API — Ips business capability. Self-contained, no shared references.
    resources:
    - name: ips
      path: /ips
      operations:
      - name: cloudflareipscloudflareipdetails
        method: GET
        description: Cloudflare/JD Cloud IP Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: networks
          in: query
          type: string
          description: Specified as `jdcloud` to list IPs used by JD Cloud data centers.
    authentication:
      type: bearer
      token: '{{env.CLOUDFLARE_API_KEY}}'
  exposes:
  - type: rest
    namespace: cloudflare-ips-rest
    port: 8080
    description: REST adapter for Cloudflare API — Ips. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/ips
      name: ips
      description: REST surface for ips.
      operations:
      - method: GET
        name: cloudflareipscloudflareipdetails
        description: Cloudflare/JD Cloud IP Details
        call: cloudflare-ips.cloudflareipscloudflareipdetails
        with:
          networks: rest.networks
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cloudflare-ips-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cloudflare API — Ips. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: cloudflare-jd-cloud-ip-details
      description: Cloudflare/JD Cloud IP Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloudflare-ips.cloudflareipscloudflareipdetails
      with:
        networks: tools.networks
      outputParameters:
      - type: object
        mapping: $.
