naftiko: 1.0.0-alpha2
info:
  label: Cloudflare Turnstile API — Verification
  description: 'Cloudflare Turnstile API — Verification. 1 operations. Lead operation: Cloudflare Verify Turnstile Token.
    Self-contained Naftiko capability covering one Cloudflare business surface.'
  tags:
  - Cloudflare
  - Verification
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CLOUDFLARE_API_KEY: CLOUDFLARE_API_KEY
capability:
  consumes:
  - type: http
    namespace: turnstile-verification
    baseUri: https://api.cloudflare.com/client/v4
    description: Cloudflare Turnstile API — Verification business capability. Self-contained, no shared references.
    resources:
    - name: siteverify
      path: /siteverify
      operations:
      - name: verifyturnstiletoken
        method: POST
        description: Cloudflare Verify Turnstile Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.CLOUDFLARE_API_KEY}}'
  exposes:
  - type: rest
    namespace: turnstile-verification-rest
    port: 8080
    description: REST adapter for Cloudflare Turnstile API — Verification. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/siteverify
      name: siteverify
      description: REST surface for siteverify.
      operations:
      - method: POST
        name: verifyturnstiletoken
        description: Cloudflare Verify Turnstile Token
        call: turnstile-verification.verifyturnstiletoken
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: turnstile-verification-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cloudflare Turnstile API — Verification. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: cloudflare-verify-turnstile-token
      description: Cloudflare Verify Turnstile Token
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: turnstile-verification.verifyturnstiletoken
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
