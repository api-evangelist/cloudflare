naftiko: 1.0.0-alpha2
info:
  label: Cloudflare Workers API — Domains
  description: 'Cloudflare Workers API — Domains. 2 operations. Lead operation: Cloudflare List Worker Domains. Self-contained
    Naftiko capability covering one Cloudflare business surface.'
  tags:
  - Cloudflare
  - Domains
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CLOUDFLARE_API_KEY: CLOUDFLARE_API_KEY
capability:
  consumes:
  - type: http
    namespace: workers-domains
    baseUri: https://api.cloudflare.com/client/v4
    description: Cloudflare Workers API — Domains business capability. Self-contained, no shared references.
    resources:
    - name: accounts-account_id-workers-domains
      path: /accounts/{account_id}/workers/domains
      operations:
      - name: listdomains
        method: GET
        description: Cloudflare List Worker Domains
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: attachdomain
        method: PUT
        description: Cloudflare Attach Custom Domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.CLOUDFLARE_API_KEY}}'
  exposes:
  - type: rest
    namespace: workers-domains-rest
    port: 8080
    description: REST adapter for Cloudflare Workers API — Domains. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/accounts/{account-id}/workers/domains
      name: accounts-account-id-workers-domains
      description: REST surface for accounts-account_id-workers-domains.
      operations:
      - method: GET
        name: listdomains
        description: Cloudflare List Worker Domains
        call: workers-domains.listdomains
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: attachdomain
        description: Cloudflare Attach Custom Domain
        call: workers-domains.attachdomain
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: workers-domains-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cloudflare Workers API — Domains. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: cloudflare-list-worker-domains
      description: Cloudflare List Worker Domains
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: workers-domains.listdomains
      outputParameters:
      - type: object
        mapping: $.
    - name: cloudflare-attach-custom-domain
      description: Cloudflare Attach Custom Domain
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: workers-domains.attachdomain
      outputParameters:
      - type: object
        mapping: $.
