naftiko: 1.0.0-alpha2
info:
  label: Cloudflare Logpush API — Datasets
  description: 'Cloudflare Logpush API — Datasets. 1 operations. Lead operation: Cloudflare List Dataset Fields. Self-contained
    Naftiko capability covering one Cloudflare business surface.'
  tags:
  - Cloudflare
  - Datasets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CLOUDFLARE_API_KEY: CLOUDFLARE_API_KEY
capability:
  consumes:
  - type: http
    namespace: logpush-datasets
    baseUri: https://api.cloudflare.com/client/v4
    description: Cloudflare Logpush API — Datasets business capability. Self-contained, no shared references.
    resources:
    - name: zones-zone_id-logpush-datasets-dataset_id-fields
      path: /zones/{zone_id}/logpush/datasets/{dataset_id}/fields
      operations:
      - name: listdatasetfields
        method: GET
        description: Cloudflare List Dataset Fields
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: dataset_id
          in: path
          type: string
          description: The dataset identifier such as http_requests, firewall_events, dns_logs, or spectrum_events.
          required: true
    authentication:
      type: bearer
      token: '{{env.CLOUDFLARE_API_KEY}}'
  exposes:
  - type: rest
    namespace: logpush-datasets-rest
    port: 8080
    description: REST adapter for Cloudflare Logpush API — Datasets. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/zones/{zone-id}/logpush/datasets/{dataset-id}/fields
      name: zones-zone-id-logpush-datasets-dataset-id-fields
      description: REST surface for zones-zone_id-logpush-datasets-dataset_id-fields.
      operations:
      - method: GET
        name: listdatasetfields
        description: Cloudflare List Dataset Fields
        call: logpush-datasets.listdatasetfields
        with:
          dataset_id: rest.dataset_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: logpush-datasets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cloudflare Logpush API — Datasets. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: cloudflare-list-dataset-fields
      description: Cloudflare List Dataset Fields
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: logpush-datasets.listdatasetfields
      with:
        dataset_id: tools.dataset_id
      outputParameters:
      - type: object
        mapping: $.
