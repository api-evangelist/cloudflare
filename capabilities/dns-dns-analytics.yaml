naftiko: 1.0.0-alpha2
info:
  label: Cloudflare DNS API — DNS Analytics
  description: 'Cloudflare DNS API — DNS Analytics. 2 operations. Lead operation: Cloudflare Get Dns Analytics Report. Self-contained
    Naftiko capability covering one Cloudflare business surface.'
  tags:
  - Cloudflare
  - DNS Analytics
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CLOUDFLARE_API_KEY: CLOUDFLARE_API_KEY
capability:
  consumes:
  - type: http
    namespace: dns-dns-analytics
    baseUri: https://api.cloudflare.com/client/v4
    description: Cloudflare DNS API — DNS Analytics business capability. Self-contained, no shared references.
    resources:
    - name: zones-zone_id-dns_analytics-report
      path: /zones/{zone_id}/dns_analytics/report
      operations:
      - name: getdnsanalyticsreport
        method: GET
        description: Cloudflare Get Dns Analytics Report
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: since
          in: query
          type: string
          description: Start date of the analytics query in ISO 8601 format.
        - name: until
          in: query
          type: string
          description: End date of the analytics query in ISO 8601 format.
    - name: zones-zone_id-dns_analytics-report-bytime
      path: /zones/{zone_id}/dns_analytics/report/bytime
      operations:
      - name: getdnsanalyticsbytime
        method: GET
        description: Cloudflare Get Dns Analytics by Time
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: since
          in: query
          type: string
          description: Start date in ISO 8601 format.
        - name: until
          in: query
          type: string
          description: End date in ISO 8601 format.
        - name: time_delta
          in: query
          type: string
          description: Time interval for grouping results.
    authentication:
      type: bearer
      token: '{{env.CLOUDFLARE_API_KEY}}'
  exposes:
  - type: rest
    namespace: dns-dns-analytics-rest
    port: 8080
    description: REST adapter for Cloudflare DNS API — DNS Analytics. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/zones/{zone-id}/dns-analytics/report
      name: zones-zone-id-dns-analytics-report
      description: REST surface for zones-zone_id-dns_analytics-report.
      operations:
      - method: GET
        name: getdnsanalyticsreport
        description: Cloudflare Get Dns Analytics Report
        call: dns-dns-analytics.getdnsanalyticsreport
        with:
          since: rest.since
          until: rest.until
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/zones/{zone-id}/dns-analytics/report/bytime
      name: zones-zone-id-dns-analytics-report-bytime
      description: REST surface for zones-zone_id-dns_analytics-report-bytime.
      operations:
      - method: GET
        name: getdnsanalyticsbytime
        description: Cloudflare Get Dns Analytics by Time
        call: dns-dns-analytics.getdnsanalyticsbytime
        with:
          since: rest.since
          until: rest.until
          time_delta: rest.time_delta
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: dns-dns-analytics-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cloudflare DNS API — DNS Analytics. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: cloudflare-get-dns-analytics-report
      description: Cloudflare Get Dns Analytics Report
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: dns-dns-analytics.getdnsanalyticsreport
      with:
        since: tools.since
        until: tools.until
      outputParameters:
      - type: object
        mapping: $.
    - name: cloudflare-get-dns-analytics-time
      description: Cloudflare Get Dns Analytics by Time
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: dns-dns-analytics.getdnsanalyticsbytime
      with:
        since: tools.since
        until: tools.until
        time_delta: tools.time_delta
      outputParameters:
      - type: object
        mapping: $.
