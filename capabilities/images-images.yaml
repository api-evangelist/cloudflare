    description: MCP adapter for Cloudflare Images API — Images. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: cloudflare-list-images
      description: Cloudflare List Images
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: images-images.listimages
