naftiko: 1.0.0-alpha2
info:
  label: Cloudflare Images API — Images
  description: 'Cloudflare Images API — Images. 5 operations. Lead operation: Cloudflare List Images. Self-contained Naftiko
    capability covering one Cloudflare business surface.'
  tags:
  - Cloudflare
  - Images
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CLOUDFLARE_API_KEY: CLOUDFLARE_API_KEY
capability:
