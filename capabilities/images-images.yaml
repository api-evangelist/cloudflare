    baseUri: https://api.cloudflare.com/client/v4
    description: Cloudflare Images API — Images business capability. Self-contained, no shared references.
    resources:
    - name: accounts-account_id-images-v1
      path: /accounts/{account_id}/images/v1
      operations:
      - name: listimages
        method: GET
        description: Cloudflare List Images
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page
          in: query
          type: integer
          description: Page number for pagination.
        - name: per_page
          in: query
          type: integer
          description: Number of images per page.
      - name: uploadimage
        method: POST
        description: Cloudflare Upload Image
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: accounts-account_id-images-v1-image_id
      path: /accounts/{account_id}/images/v1/{image_id}
      operations:
      - name: getimage
        method: GET
        description: Cloudflare Get Image Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateimage
        method: PATCH
        description: Cloudflare Update Image
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteimage
        method: DELETE
        description: Cloudflare Delete Image
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.CLOUDFLARE_API_KEY}}'
  exposes:
  - type: rest
    namespace: images-images-rest
    port: 8080
    description: REST adapter for Cloudflare Images API — Images. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/accounts/{account-id}/images/v1
      name: accounts-account-id-images-v1
      description: REST surface for accounts-account_id-images-v1.
      operations:
      - method: GET
        name: listimages
        description: Cloudflare List Images
        call: images-images.listimages
        with:
          page: rest.page
          per_page: rest.per_page
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: uploadimage
        description: Cloudflare Upload Image
        call: images-images.uploadimage
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/accounts/{account-id}/images/v1/{image-id}
      name: accounts-account-id-images-v1-image-id
      description: REST surface for accounts-account_id-images-v1-image_id.
      operations:
      - method: GET
        name: getimage
        description: Cloudflare Get Image Details
        call: images-images.getimage
        outputParameters:
